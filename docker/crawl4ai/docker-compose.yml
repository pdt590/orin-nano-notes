services:
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai

    restart: unless-stopped

    ports:
      - "11235:11235"

    shm_size: "1gb"

    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./.llm.env:/app/.llm.env:ro

    environment:
      TZ: Asia/Ho_Chi_Minh
      CRAWL4AI_API_TOKEN: 78bea0976c00ba5c4d223a5f4c414e53f8a1a5bb2aeb92e3d8eb1cde8b3c018e
