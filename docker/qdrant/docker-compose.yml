services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant

    restart: unless-stopped

    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API

    volumes:
      - ./qdrant_storage:/qdrant/storage

    environment:
      QDRANT__LOG_LEVEL: INFO

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
